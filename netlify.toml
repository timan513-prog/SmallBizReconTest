[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA routing — every unmatched path serves the React app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Deploy previews for pull requests + named branch deploys.
[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "production" }
